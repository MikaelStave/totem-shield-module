# USB logging off — needed for stable BLE on Xiao (USB CDC ACM conflicts with BLE).
# CONFIG_ZMK_USB_LOGGING=n

# USB boot protocol off for now — can cause BlueZ to reject the HID profile.
# CONFIG_ZMK_USB_BOOT=y

# Report battery level every 5 minutes instead of every minute.
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=300

# Debounce settings.
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Temporarily use default BLE TX power to rule out weak inter-half link.
# (Previous -8 dBm setting can drop the peripheral at desk distance.)
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=n
# CONFIG_BT_CTLR_TX_PWR_MINUS_8=y

# Temporarily disable mouse emulation to rule out a split-pointing regression.
# CONFIG_ZMK_POINTING=y

# Fetch and proxy the peripheral (right) half battery level to the host.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Temporarily disable deep sleep to rule out wake/reconnect problems.
# CONFIG_ZMK_SLEEP=y
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Keep the keyboard responsive; start idle timeouts after 30s of no input.
CONFIG_ZMK_IDLE_TIMEOUT=30000

# Enable indicator LEDs for debugging (see totem_left.overlay for LED meaning).
CONFIG_ZMK_INDICATOR_LEDS_INIT_PRIORITY=92
