# Disable USB logging to allow deep sleep and maximize battery life.
# Re-enable temporarily only when debugging.
# CONFIG_ZMK_USB_LOGGING=n

CONFIG_ZMK_USB_BOOT=y

# Report battery level every 5 minutes instead of every minute.
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=300

# Debounce settings.
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Lower BLE TX power for better battery life. Range between halves will be
# slightly shorter, but still fine for a desk setup.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=n
CONFIG_BT_CTLR_TX_PWR_MINUS_8=y

# Enable mouse emulation (mouse buttons, move, scroll).
CONFIG_ZMK_POINTING=y

# Fetch and proxy the peripheral (right) half battery level to the host.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Enable deep sleep after 15 minutes of inactivity.
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Keep the keyboard responsive; start idle timeouts after 30s of no input.
CONFIG_ZMK_IDLE_TIMEOUT=30000

# Disable indicator LEDs to save power.
# CONFIG_ZMK_INDICATOR_LEDS_INIT_PRIORITY=92
