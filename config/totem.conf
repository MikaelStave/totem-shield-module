# USB logging off — needed for stable BLE on Xiao (USB CDC ACM conflicts with BLE).
# CONFIG_ZMK_USB_LOGGING=n

# USB boot protocol off to save power.
# CONFIG_ZMK_USB_BOOT=y

# Report battery level every 5 minutes instead of every minute.
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=300

# Debounce settings.
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Use default BLE TX power for a balance of range and battery life.
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# CONFIG_BT_CTLR_TX_PWR_MINUS_8=y

# Mouse emulation disabled to save power (re-enable if needed).
# CONFIG_ZMK_POINTING=y

# Disable right-half battery fetching/proxying to save power.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=n

# Deep sleep after 15 minutes of inactivity.
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Keep the keyboard responsive; start idle timeouts after 30s of no input.
CONFIG_ZMK_IDLE_TIMEOUT=30000

# Disable indicator LEDs to save power.
# CONFIG_ZMK_INDICATOR_LEDS_INIT_PRIORITY=92
